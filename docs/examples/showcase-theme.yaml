# Showcase theme for mark2word — global, element, table, code, page chrome, and
# region styling. Loaded via `extends: showcase-theme.yaml` in showcase.md.

extends: showcase-base.yaml

page:
  size: letter
  margin:
    top: 0.75in
    bottom: 0.65in
    left: 0.65in
    right: 0.65in
  header: "mark2word || {title}"
  footer: "Style Gallery · showcase.md || Page {page} of {pages}"

font: Calibri
size: 11
color: "1A1A1A"

text:
  line: 1.12

body:
  space_after: 4pt

list:
  space_before: 2pt
  space_between: 3pt
  space_after: 6pt
  indent_left: 14pt
  indent_hanging: 14pt
  indent_step: 14pt

ol:
  levels:
    0: { format: "1." }
    1: { format: "a." }
    2: { format: "i." }

ul:
  levels:
    0: { num_fmt: bullet, template: "*" }
    1: { num_fmt: bullet, template: "o" }
    2: { num_fmt: bullet, template: "-" }

blockquote:
  space_before: 6pt
  space_after: 6pt
  color: "404040"
  italic: true

hr:
  border_bottom: { size: 0.75pt, color: "2B579A" }
  space_before: 14pt
  space_after: 14pt

code:
  font: Consolas
  size: 9
  color: "1F497D"

code_block:
  langs:
    python: { color: "000080" }
    yaml: { color: "006666" }
    bash: { color: "333333" }

code_inline:
  color: "1F497D"

image:
  max_width: 4in
  alt_mode: doc
  align: center

heading:
  bold: true
  color: "2B579A"

h1:
  size: 22
  color: "000000"
  space_after: 4pt

h2:
  size: 16
  space_before: 16pt
  space_after: 6pt
  border_bottom: { size: 0.75pt, color: "2B579A" }

h3:
  size: 13
  italic: true
  color: "2B579A"
  space_before: 12pt

h4:
  size: 12
  bold: true

h5:
  size: 11
  color: "404040"

h6:
  size: 10
  color: "666666"
  italic: true

table:
  font: Calibri
  size: 10
  space_before: 8pt
  space_after: 8pt
  border: { size: 0.5pt, color: "B4C6E7" }

th:
  bold: true
  color: "FFFFFF"
  fill: "2B579A"
  align: center
  padding: { top: 6pt, bottom: 6pt, left: 8pt, right: 8pt }

td:
  size: 10
  padding: { top: 4pt, bottom: 4pt, left: 8pt, right: 8pt }

$header-region:
  align: center
  font: Aptos
  h1:
    size: 28
    color: "1F497D"
    space_after: 2pt
  body:
    size: 10
    color: "5B5B5B"

$pullquote:
  font: Georgia
  size: 13
  color: "C00000"
  italic: true
  body:
    align: center
    space_before: 10pt
    space_after: 10pt
    indent_left: 28pt
    indent_right: 28pt

$feature-grid:
  table:
    space_before: 4pt
  th:
    fill: "1F497D"
  td:
    size: 9

$theme-sample:
  font: Calibri
  color: "1F4E79"
  body:
    size: 9
    line: 13pt
    indent_left: 20pt
    space_after: 2pt
  list:
    space_between: 1pt
    indent_left: 10pt
    indent_hanging: 10pt

$theme-sample2:
  font: Georgia
  color: "008000"
  body:
    size: 10
    line: 13pt
    indent_left: 25pt
    space_after: 2pt
  list:
    space_between: 1pt
    indent_left: 10pt
    indent_hanging: 10pt

$theme-list-sample:
  list:
    levels:
      0: { color: "943634" }
      1: { color: "028010" }
      2: { color: "1F4E79" }

$appendix:
  ol:
    levels:
      0: { format: "01." }
  body:
    size: 10
    color: "404040"

$footer-region:
  align: center
  font: Calibri
  size: 8
  color: "7F7F7F"
  body:
    space_before: 12pt
