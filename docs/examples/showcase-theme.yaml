# Showcase theme for mark2word — demonstrates global, element, table, code,
# and region styling. Loaded via `extends: showcase-theme.yaml` in the sample
# markdown frontmatter.

extends: showcase-base.yaml

page:
  size: letter
  margin:
    top: 0.6in
    bottom: 0.6in
    left: 0.75in
    right: 0.75in

font: Calibri
size: 11
color: "1A1A1A"

text:
  line: 1.12

body:
  space_after: 4pt

list:
  space_before: 2pt
  space_between: 3pt
  space_after: 6pt
  indent_left: 14pt
  indent_hanging: 14pt

code:
  font: Consolas
  size: 9
  color: "1F497D"

heading:
  bold: true
  color: "2B579A"

h1:
  size: 22
  color: "000000"
  space_after: 4pt

h2:
  size: 16
  space_before: 16pt
  space_after: 6pt
  border_bottom:
    size: 0.75pt
    color: "2B579A"

h3:
  size: 13
  italic: true
  color: "2B579A"
  space_before: 12pt

h4:
  size: 12
  bold: true

h5:
  size: 11
  color: "404040"

h6:
  size: 10
  color: "666666"
  italic: true

table:
  font: Calibri
  size: 10

th:
  bold: true
  color: "FFFFFF"
  fill: "2B579A"
  align: center

td:
  size: 10

$header:
  align: center
  font: Aptos
  h1:
    size: 26
    color: "1F497D"
    space_after: 2pt
  body:
    size: 10
    color: "5B5B5B"

$pullquote:
  font: Georgia
  size: 13
  color: "C00000"
  italic: true
  body:
    align: center
    space_before: 8pt
    space_after: 8pt
    indent_left: 24pt
    indent_right: 24pt

$theme-sample:
  font: Calibri
  color: "1F4E79"
  body:
    size: 9
    line: 13pt
    indent_left: 20pt
    space_after: 2pt
  list:
    space_between: 1pt
    indent_left: 10pt
    indent_hanging: 10pt

$theme-sample2:
  font: Georgia
  color: "008000"
  body:
    size: 10
    line: 13pt
    indent_left: 25pt
    space_after: 2pt
  list:
    space_between: 1pt
    indent_left: 10pt
    indent_hanging: 10pt

$theme-list-sample:
  list:
    levels:
      0: {color: "#943634"}
      1: {color: 028010}
      2: {color: 1F4E79}

$footer:
  align: center
  font: Calibri
  size: 8
  color: "7F7F7F"
  body:
    space_before: 10pt
